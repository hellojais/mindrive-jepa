data:
  # Path to folder containing nuPlan mini .db files
  raw_data_dir: "data/raw/nuplan-v1.1_mini/data/cache/mini"
  processed_dir: "data/processed"
  toy_slice_dir: "data/toy_slice"
  max_agents: 20          # pad/truncate to this many agents per frame (excludes ego)
  agent_feat_dim: 6       # [x, y, vx, vy, heading, agent_type]
  sequence_len: 50        # timesteps per scenario (5 seconds at 10Hz)
  prediction_horizon: 20  # predict this many steps ahead (2 seconds)
  train_split: 0.8
  position_scale_m: 50.0  # divide x,y by this to normalize: agents within 50m → [-1, 1]
  velocity_scale_ms: 10.0 # divide vx,vy by this to normalize: 10 m/s (~36 km/h) → 1.0

model:
  d_model: 128
  n_heads: 4
  n_encoder_layers: 4
  n_predictor_layers: 2
  dropout: 0.2
  ema_decay: 0.996
  lambda_aux: 0.1         # weight for position decoder auxiliary loss

training:
  batch_size: 32
  learning_rate: 3e-4
  weight_decay: 1e-4
  max_epochs: 50
  warmup_epochs: 5
  device: "mps"
  checkpoint_dir: "checkpoints"
  log_every_n_steps: 10

evaluation:
  surprise_threshold_percentile: 90
